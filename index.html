<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Scripts | Premium Google Sheets & Apps Script Solutions</title>
    <meta name="description"
        content="Discover high-quality Google Sheets and Apps Script solutions for inventory management, attendance tracking, and business automation.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="container nav-content">
            <a href="#" class="logo">
                <i class="fa-solid fa-code"></i>
                AM Scripts
            </a>

            <div class="search-bar">
                <i class="fa-solid fa-search"
                    style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="text" id="searchInput" placeholder="Search scripts by name or category...">
            </div>

            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="#" class="btn btn-secondary" style="padding: 0.5rem 1.25rem;">Login</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="stats-banner animate-in">
                <i class="fa-solid fa-trophy fa-2x"></i>
                <p>#1 Rated Google Sheets & Apps Script Experts Worldwide — 350+ Projects Delivered</p>
                <div
                    style="background: rgba(255,255,255,0.2); padding: 0.25rem 1rem; border-radius: 2rem; font-size: 0.875rem;">
                    <i class="fa-solid fa-check-circle"></i> Verified Since 2022
                </div>
            </div>

            <div class="filters animate-in" style="animation-delay: 0.1s;">
                <button class="filter-btn active" data-filter="all">All Categories</button>
                <button class="filter-btn" data-filter="management">Management</button>
                <button class="filter-btn" data-filter="education">Education</button>
                <button class="filter-btn" data-filter="automation">Automation</button>
                <button class="filter-btn" data-filter="free">Free Scripts</button>
            </div>
        </section>

        <div class="grid" id="scriptGrid">
            <!-- Cards will be injected by script.js -->
        </div>
    </main>

    <footer style="background: var(--surface); border-top: 1px solid var(--border); padding: 3rem 0; margin-top: 5rem;">
        <div class="container" style="text-align: center;">
            <p style="color: var(--text-muted);">© 2026 AM Scripts. All rights reserved.</p>
        </div>
    </footer>

    <a href="https://wa.me/923237900211?text=Hi%20AM%2C%20I'd%20like%20to%20inquire%20about%20your%20scripts."
        class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>

</html>
